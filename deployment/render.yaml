# Render blueprint: deploys the FastAPI backend as a Docker web service.
services:
  - type: web
    name: lendiq-api
    runtime: docker
    dockerfilePath: docker/Dockerfile.backend
    dockerContext: .
    plan: starter
    healthCheckPath: /
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set in Render dashboard
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false          # paste full service-account JSON in Render dashboard
      - key: FIRESTORE_PROJECT_ID
        value: lendiq-dc313
      - key: FIRESTORE_DATABASE
        value: (default)
      - key: CORS_ORIGINS
        value: https://lendiq.vercel.app,http://localhost:3000
      - key: ENVIRONMENT
        value: production
